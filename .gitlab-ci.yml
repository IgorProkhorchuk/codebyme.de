stages:
  - test
  - build
  - package
  - deploy

.gradle-cache: &gradle-cache
  key: "gradle-cache"
  paths:
    - backend/.gradle/wrapper
    - backend/.gradle/caches

variables:
  # Use Docker-in-Docker for building images
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# --- Stage 1: Tests ---
# Run backend tests
test-backend:
  stage: test
  image: gradle:jdk25-corretto
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    <<: *gradle-cache
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "devel"'
  script:
    - cd backend
    - ./gradlew test --no-daemon

# Run frontend checks (lint/types)
test-frontend:
  stage: test
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "devel"'
  script:
    - cd frontend
    - npm ci
    - npm run check # Runs svelte-check (TypeScript validation)
    # - npm run test:unit (Uncomment when add unit tests)

# --- Stage 2: Build Native JAR ---
build-backend-jar:
  stage: build
  image: gradle:jdk25-corretto
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/backend/.gradle"
  cache:
    <<: *gradle-cache
  script:
    - cd backend
    - ./gradlew clean :app:bootJar -x test --no-daemon
  artifacts:
    paths:
      - backend/app/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- Stage 3: Build & Push Docker Images ---
# Only runs if tests pass
build-images:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build Backend
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest ./backend
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    
    # Build Frontend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- Stage 3: Deploy to Server ---
deploy-to-server:
  stage: deploy
  image: alpine:latest
  before_script:
    # Install SSH client
    - apk add --no-cache openssh-client gettext
    # Setup SSH key
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    # 1. Substitute variables in docker-compose.prod.yml (populates image names)
    # We export the CI vars so envsubst can use them
    - export CI_PROJECT_NAMESPACE=$(echo "$CI_PROJECT_NAMESPACE" | tr '[:upper:]' '[:lower:]')
    - export CI_PROJECT_NAME=$(echo "$CI_PROJECT_NAME" | tr '[:upper:]' '[:lower:]')
    - envsubst '$CI_PROJECT_NAMESPACE $CI_PROJECT_NAME' < docker-compose.prod.yml > docker-compose.final.yml
    
    # 2. Generate .env file securely from GitLab CI/CD Variables
    - echo "DB_NAME=$DB_NAME" >> .env
    - echo "DB_USER=$DB_USER" >> .env
    - echo "DB_PASS=$DB_PASS" >> .env
    
    # 3. Transfer the compose and env files to the server
    - scp docker-compose.final.yml $SERVER_USER@$SERVER_IP:/srv/codebyme.de/docker-compose.yml
    - scp .env $SERVER_USER@$SERVER_IP:/srv/codebyme.de/.env
    
    # 4. SSH in and update containers
    - ssh $SERVER_USER@$SERVER_IP "
        cd /srv/codebyme.de;
        
        echo 'Logging into GitLab Registry...';
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY;
        
        echo 'Pulling new images...';
        docker compose pull;
        
        echo 'Restarting services...';
        docker compose up -d --remove-orphans;
        
        echo 'Pruning old images...';
        docker image prune -f;
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
